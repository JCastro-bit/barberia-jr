<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="20" fill="#1f2937"/>
  <!-- Scissors icon - barbería -->
  <g transform="translate(64,64)">
    <!-- Left blade -->
    <ellipse cx="-20" cy="28" rx="14" ry="18" fill="none" stroke="#d4af37" stroke-width="5"/>
    <!-- Right blade -->
    <ellipse cx="20" cy="28" rx="14" ry="18" fill="none" stroke="#d4af37" stroke-width="5"/>
    <!-- Blades going up -->
    <line x1="-12" y1="14" x2="16" y2="-40" stroke="#d4af37" stroke-width="6" stroke-linecap="round"/>
    <line x1="12" y1="14" x2="-16" y2="-40" stroke="#d4af37" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
